name: RAG Evaluation Quality Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'rag-platform/**'
      - '.github/workflows/rag-eval.yml'
  push:
    branches: [main]
    paths:
      - 'rag-platform/**'
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[eval]"
          pip install pytest

      - name: Run unit tests
        run: |
          PYTHONPATH=. python -m pytest \
            libs/rag/evaluation/tests/ \
            libs/rag/generation/tests/ \
            libs/rag/context/tests/ \
            libs/observability/tests/ \
            -v --tb=short

  quality-gate:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: rag-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[eval]"
          pip install pytest

      - name: Run RAG quality gate (lenient thresholds)
        run: |
          PYTHONPATH=. python scripts/eval/run_quality_gate.py \
            --lenient \
            --no-fail \
            --output data/eval/reports/ci_report.json

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rag-eval-report
          path: rag-platform/data/eval/reports/ci_report.json
          retention-days: 30

  nightly-full-eval:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[eval]"

      - name: Run full evaluation with baseline save
        run: |
          PYTHONPATH=. python scripts/eval/run_full_evaluation.py \
            --lenient-gate \
            --save-baseline \
            --output data/eval/reports/nightly_report.json

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        with:
          name: rag-nightly-eval
          path: rag-platform/data/eval/reports/nightly_report.json
